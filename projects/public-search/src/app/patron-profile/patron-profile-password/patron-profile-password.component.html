<ngx-loading-bar [includeSpinner]="false" height="3px"></ngx-loading-bar>
<div class="ui:mt-2">
  <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">
    <div class="ui:mb-2">
      <formly-form [model]="model" [fields]="fields" [form]="form" />
    </div>
    <div class="ui:flex ui:gap-2 ui:justify-end">
      <p-button severity="danger" [label]="'Cancel' | translate" icon="fa-solid fa-xmark" outlined (onClick)="cancel()" />
      <p-button type="submit" [disabled]="!form.valid || httpPending.isPending()" [label]="'Save' | translate" icon="fa-solid fa-floppy-disk" />
    </div>
  </form>
</div>
