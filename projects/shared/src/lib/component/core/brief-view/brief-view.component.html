<div class="ui:flex ui:content-start">
  @if (iconTemplate()) {
    <div class="ui:text-center">
      <ng-container [ngTemplateOutlet]="iconTemplate()" />
    </div>
  }
  <div class="ui:mx-4">
    <div>
      @if (titleTemplate()) {
        <ng-container
          [ngTemplateOutlet]="titleTemplate()"
          [ngTemplateOutletContext]="{ title:title(), link:detailUrl() }"
        />
      } @else {
        <h5>
          @if (link()) {
            @if (isArray(detailUrl())) {
              <a [routerLink]="detailUrl()">{{ title() }}</a>
            } @else {
              <a [href]="detailUrl()">{{ title() }}</a>
            }
          } @else {
            {{ title() }}
          }
        </h5>
      }
    </div>
    @if (contentTemplate()) {
      <div class="ui:italic">
        <ng-container [ngTemplateOutlet]="contentTemplate()" />
      </div>
    }
    <div>
      @if (tagsTemplate()) {
        <ng-container
          [ngTemplateOutlet]="tagsTemplate()"
          [ngTemplateOutletContext]="{ $implicit: tags() }"
        />
      } @else {
        @if (tags()) {
          <div id="subject" class="ui:flex ui:gap-1 ui:flex-wrap">
            @for (tag of tags(); track $index) {
              <p-tag severity="success" [value]="tag.label"/>
            }
          </div>
        }
      }
    </div>
  </div>
</div>
