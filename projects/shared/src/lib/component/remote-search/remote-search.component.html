@if (!hideSearchElement()) {
  <ng-core-search-autocomplete
    [placeholder]="placeholder() | ucfirst"
    [value]="value()"
    [recordTypes]="recordTypes"
    [inputStyleClass]="inputstyleclass()"
    [styleClass]="styleclass()"
    scrollHeight="400px"
    (searchQuery)="onSearch($event)" />
}
