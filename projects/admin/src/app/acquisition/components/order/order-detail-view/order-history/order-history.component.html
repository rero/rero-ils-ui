<p-timeline [value]="versions()">
  <ng-template #opposite let-version>
    <a [routerLink]="['/acquisition', 'records', 'acq_orders', 'detail', version.pid]">{{ version.label }}</a>
  </ng-template>
  <ng-template #content let-version>
    <small>{{ version.description }}</small>
  </ng-template>
</p-timeline>
