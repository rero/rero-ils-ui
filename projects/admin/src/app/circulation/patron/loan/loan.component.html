<section>
  <div class="ui:grid ui:grid-cols-12 ui:gap-4 ui:mb-6">
    <div class="ui:col-span-6">
      <div class="ui:flex ui:gap-1">
        <div class="ui:grow">
          <ng-core-search-input
            [placeholder]="'Checkout/checkin: please enter an item barcode.' | translate"
            [searchText]="searchText()"
            (searchQuery)="searchValueUpdated($event)"
            [focus]="searchInputFocus()"
            [disabled]="searchInputDisabled()"
          />
        </div>
        <div class="ui:self-center ui:pl-1">
          <admin-circulation-settings />
        </div>
      </div>

      @if (store.settings().length > 0) {
        <div class="ui:flex ui:gap-1 ui:mt-2">
          @for (setting of store.settings(); track $index) {
            <p-tag [severity]="$any(setting.extra?.severity || 'warn')">
              {{ setting.label }}
              <i class="fa fa-times-circle ui:ml-2" tabindex="0" (click)="removeCheckoutSettings(setting.key)" (keyup.enter)="removeCheckoutSettings(setting.key)"></i>
            </p-tag>
          }
        </div>
      }
    </div>
    <!-- Sorting loans -->
    <div class="ui:col-span-6 ui:flex ui:items-start ui:justify-end">
      <p-select
        [ngModel]="sortCriteria()" (ngModelChange)="sortCriteria.set($event)"
        [options]="[
          {value:'-transaction_date', label:'Transaction date (desc)' | translate, icon:'fa fa-sort-numeric-desc'},
          {value:'transaction_date', label:'Transaction date' | translate, icon:'fa fa-sort-numeric-asc'},
          {value:'-due_date', label:'Due date (desc)' | translate, icon:'fa fa-sort-numeric-desc'},
          {value:'due_date', label:'Due date' | translate, icon:'fa fa-sort-numeric-asc'},
          {value:'-location', label:'Location (desc)' | translate, icon: 'fa fa-sort-numeric-desc'},
          {value:'location', label:'Location' | translate, icon: 'fa fa-sort-numeric-asc'}
        ]"
        (onChange)="selectingSortCriteria($event)"
      >
        <ng-template #selectedItem let-item>
          <div class="ui:flex ui:items-center ui:gap-2">
            <i [class]="item.icon"></i>
            <div>{{ item.label }}</div>
          </div>
        </ng-template>
        <ng-template #item let-item>
          <div class="ui:flex ui:items-center ui:gap-2">
            <i [class]="item.icon"></i>
            <div>{{ item.label }}</div>
          </div>
        </ng-template>
      </p-select>
    </div>
  </div>
  <admin-circulation-items-list
    [checkedOutItems]="checkedOutItems()"
    [checkedInItems]="checkedInItems()"
    [patron]="store.patron()"
    (extendLoanClicked)="applyItems($any([$event]))"
    (extendAllLoansClicked)="applyItems($event)"
    (hasFeesEmitter)="hasFees($event)"
  />
</section>
