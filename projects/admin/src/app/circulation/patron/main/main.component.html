@if (menuItems().length) {
  <admin-circulation-patron-detailed
    [patron]="store.patron()"
    [barcode]="barcode()"
    [displayCirculationMessages]="true"
    (clearPatron)="clearPatron()"
  />
  <p-tabs [value]="activeTab()">
    <p-tablist>
      @for(item of menuItems(); track item.id) {
        <p-tab class="ui:flex ui:items-center ui:!gap-2" [value]="item.id" [routerLink]="item.routerLink">
          <span>{{ item.label | translate }}</span>
          @if ($any(store.statistics())[item.id] > 0) {
            @if (item.withCurrency) {
              <p-badge
                [severity]="item.severity || 'info'"
                [value]="$any(store.statistics())[item.id] | currency: appStore.organisation().default_currency"
              />
            } @else {
              <p-badge [severity]="item.severity || 'info'" [value]="$any(store.statistics())[item.id]" />
            }
          }
        </p-tab>
      }
    </p-tablist>
  </p-tabs>
  <div class="ui:mt-6">
    <router-outlet />
  </div>
}
