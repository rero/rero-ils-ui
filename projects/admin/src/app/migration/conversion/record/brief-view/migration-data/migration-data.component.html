@if (record(); as rec) {
<h5>
  <a
    [routerLink]="[detailUrl()?.link]"
    [queryParams]="{ migration: rec.metadata.migration_id }"
  >
    {{ rec.id }}&nbsp;
    <p-tag
      [severity]="$any(status() === 'complete' ? 'success' : status()?.endsWith('error') ? 'danger' : 'secondary')"
      [value]="rec.metadata.conversion.status | translate"
    />
  </a>
</h5>
@if (rec.metadata?.conversion?.json?.title) {
  {{ rec.metadata.conversion.json.title | mainTitle }}
}
<div class="ui:text-xs ui:italic">
  <span translate>Modification date</span>:&nbsp;{{ rec.metadata?.updated_at | dateTranslate : "medium" }}
</div>
}
