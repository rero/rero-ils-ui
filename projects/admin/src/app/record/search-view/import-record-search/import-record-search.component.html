<ng-core-record-search class="core:my-1">
  <p-select
    afterInputSearch

    optionLabel="name"
    [ngModel]="maxRecordsSelected()"
    (ngModelChange)="maxRecordsSelected.set($event)"
  />
</ng-core-record-search>
