@if (data() && data().length > 0) {
  <p-table stripedRows [value]="data()" [tableStyle]="{ 'min-width': '50rem' }" size="small">
    <ng-template #body let-line>
      <tr>
        @for (value of line; track $index) {
          <td>{{ value }}</td>
        }
      </tr>
    </ng-template>
  </p-table>
} @else {
  <p class="ui:m-0 ui:px-6 ui:py-2  ui:text-muted-color" translate>No result</p>
}
