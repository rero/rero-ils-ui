  @if (record()) {
    <ng-core-detail-button
    [record]="record()"
    [type]="type()"
    [adminMode]="adminMode()"
    [useStatus]="useStatus()"
    [updateStatus]="updateStatus()"
    [deleteStatus]="deleteStatus()"
    (recordEvent)="recordEvent($event)"
    (deleteMessageEvent)="showDeleteMessage($event)"
  >
    <ng-container beforeButton>
      @if (record()) {
        @if (appStore.isLogVisible('holdings') && record()?.metadata.pid) {
          <shared-operation-logs-dialog resourceType="holdings" [resourcePid]="$any(record()?.metadata.pid)" />
        }
      }
    </ng-container>
  </ng-core-detail-button>
  }
  @if (error()) {
    <ng-core-error [error]="error()" />
  }
  <ng-container #dynamicHost />
