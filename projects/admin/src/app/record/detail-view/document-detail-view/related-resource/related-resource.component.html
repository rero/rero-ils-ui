@if (electronicLocator()) {
    <a target="_blank" [href]="electronicLocator().url | safeUrl">
      <i class="fa fa-link"></i> {{ electronicLocator().type | translate }}
      @if (electronicLocator().content) {
        : {{ electronicLocator().content | translate }}
      }
    </a>
    @if (publicNotes) {
      ({{ publicNotes }})
    }
}
