@if (canAdd() && options().length > 0) {
  <div class="ui:flex ui:justify-end" [permissions]="[perms.HOLD_CREATE, perms.ITEM_CREATE]">
    <p-menu #menu [model]="options()" [popup]="true" />
    <p-button icon="fa-solid fa-caret-down" iconPos="right" outlined (onClick)="menu.toggle($event)" [label]="'Add'|translate"/>
  </div>
}
