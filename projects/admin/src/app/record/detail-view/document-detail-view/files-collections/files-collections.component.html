@if (currentParentRecord()) {
<h5 translate>Digital collections</h5>
  <form [formGroup]="formGroup">
    <p-autocomplete
      #autocomplete
      multiple
      [typeahead]="false"
      [pTooltip]="'Comma-separated list of digital collection names. Digital collections allow the searching/grouping of related documents containing files.'|translate"
      tooltipPosition="top"
      formControlName="collections"
      [unique]="true"
    >
      <ng-template let-collection pTemplate="selectedItem">
        <a target="_blank" [href]="getCollectionLink(collection)">{{ collection }}&nbsp;<i class="fa-solid fa-up-right-from-square"></i></a>
      </ng-template>
    </p-autocomplete>
</form>
}
