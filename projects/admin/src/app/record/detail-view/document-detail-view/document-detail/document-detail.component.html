<div>
  @if (record()) {
    <ng-core-detail-button
      [record]="record() ?? null"
      [type]="type()"
      [adminMode]="adminMode()"
      [useStatus]="useStatus()"
      [updateStatus]="updateStatus()"
      [deleteStatus]="deleteStatus()"
      (recordEvent)="recordEvent($event)"
      (deleteMessageEvent)="showDeleteMessage($event)"
    >
      <ng-container beforeButton>
        @if (record()) {
          <a
            pButton
            icon="fa-solid fa-users"
            severity="secondary"
            outlined
            href="/{{ appStore.settings.globalView() }}/documents/{{ $any(record()).metadata.pid }}"
            translate
          >
            See in public interface
          </a>
          @if (appStore.isLogVisible('documents') && record()?.metadata.pid) {
            <shared-operation-logs-dialog resourceType="documents" [resourcePid]="$any(record()?.metadata.pid)" />
          }
          @if (!record()?.metadata.pid && source) {
            <p-button
              icon="fa-solid fa-cloud-arrow-down"
              [label]="'Import'|translate"
              outlined
              [permissions]="permissions.DOC_CREATE"
              (onClick)="importDocument($event, record(), { source: source, pid: pid() })"
            />
          }
          @if (record()?.metadata.pid) {
            <p-button
              icon="fa-regular fa-copy"
              [label]="'Duplicate'|translate"
              outlined
              [permissions]="permissions.DOC_CREATE"
              [routerLink]="['/records', 'documents', 'duplicate']"
              [queryParams]="{type: 'documents', pid: record()?.metadata.pid}"
            />
          }
        }
      </ng-container>
    </ng-core-detail-button>
  }
  @let err = error();
  @if (err) {
    <ng-core-error [error]="err" />
  }
  <ng-container #dynamicHost />
</div>
