@if (record()) {
  <ng-core-detail-button
    [record]="record()"
    [type]="type()"
    [adminMode]="adminMode()"
    [useStatus]="useStatus()"
    [updateStatus]="updateStatus()"
    [deleteStatus]="deleteStatus()"
    (recordEvent)="recordEvent($event)"
    (deleteMessageEvent)="showDeleteMessage($event)"
  >
    <ng-container beforeButton>
      <p-button
        (onClick)="search(record())"
        outlined
        icon="fa fa-search"
        [label]="'Search documents' | translate"
      />
      @if (appStore.isLogVisible('local_entities') && record()?.metadata.pid) {
        <shared-operation-logs-dialog
          resourceType="local_entities"
          [resourcePid]="$any(record()?.metadata.pid)"
        />
      }
    </ng-container>
  </ng-core-detail-button>
}

@if (error()) {
  <ng-core-error [error]="error()" />
}

<ng-container #dynamicHost />
