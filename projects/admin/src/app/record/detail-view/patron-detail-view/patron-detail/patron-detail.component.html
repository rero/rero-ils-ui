<div>
  @if (record()) {
    <ng-core-detail-button
      [record]="record() ?? null"
      [type]="type()"
      [adminMode]="adminMode()"
      [useStatus]="useStatus()"
      [updateStatus]="updateStatus()"
      [deleteStatus]="deleteStatus()"
      (recordEvent)="recordEvent($event)"
      (deleteMessageEvent)="showDeleteMessage($event)"
    >
      <ng-container beforeButton>
        @if (record()) {
          @if (appStore.isLogVisible('patrons') && record()!.metadata.pid) {
            <shared-operation-logs-dialog resourceType="patrons" [resourcePid]="$any(record()!.metadata.pid)" />
          }
        }
      </ng-container>
    </ng-core-detail-button>
  }
  @let err = error();
  @if (err) {
    <ng-core-error [error]="err" />
  }
  <ng-container #dynamicHost />
</div>
