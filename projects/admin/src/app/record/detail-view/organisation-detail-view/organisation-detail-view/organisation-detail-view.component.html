@if (record(); as record) {
  <section id="organisation-profile" class="ui:flex ui:flex-col ui:gap-2 ui:mb-4">
    <div class="ui:rounded-border ui:border ui:border-surface ui:flex ui:gap-6 ui:p-6">
      <div class="ui:bg-surface-500 ui:rounded-full ui:w-40 ui:h-40 ui:flex ui:items-center ui:justify-center">
        <i class="fa fa-university fa-4x ui:text-white"></i>
      </div>

      <div class="ui:grow">
        <h1>{{ record.metadata.name }}</h1>

        <dl class="metadata">
          @if (record.metadata.code) {
            <dt><i class="fa fa-code"></i>&nbsp;<span translate>Code</span></dt>
            <dd>{{ record.metadata.code }}</dd>
          }

          @if (record.metadata.address) {
            <dt><i class="fa fa-home"></i>&nbsp;<span translate>Address</span></dt>
            <dd>{{ record.metadata.address }}</dd>
          }

          @if (record.metadata.default_currency) {
            <dt><i class="fa fa-money"></i>&nbsp;<span translate>Default currency</span></dt>
            <dd>{{ record.metadata.default_currency }}</dd>
          }
        </dl>
      </div>
    </div>
  </section>
}
